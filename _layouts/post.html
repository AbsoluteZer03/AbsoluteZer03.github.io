---
layout: default
---
<article class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-meta">
    <span class="post-date">{{ page.date | date: "%Y-%m-%d" }}</span>
    {% if page.categories %}
    <span class="post-tags">
      {% for cat in page.categories %}
        &nbsp;#<a href="/categories/{{ cat }}/">{{ cat }}</a>
      {% endfor %}
    </span>
    {% endif %}
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</article>
